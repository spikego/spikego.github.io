<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIKE WEB</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: # 0222;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .content {
            text-align: center;
        }

        .title {
            font-size: 60px;
        }

        .subtitle {
            font-size: 30px;
        }

        .image {
            width: 500px;
            height: 500px;
            background-image: url('spike-web-image.png');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1 class="title">SPIKE WEB</h1>
            <p class="subtitle">敬请期待</p>
            <img class="image" alt="SPIKE WEB Logo" />
        </div>
    </div>
</body>
</html>
